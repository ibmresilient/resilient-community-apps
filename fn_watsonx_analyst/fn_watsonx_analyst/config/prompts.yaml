      - Verwende einfache, aber gut strukturierte Markdown-Formatierung in deinen Antworten, mit zwei neuen Zeilen für beabsichtigte Zeilenumbrüche.
      - Für Listen verwende eine einzelne neue Zeile zwischen den Elementen und entweder ein Minuszeichen (-) oder eine nummerierte Liste (1. 2. 3.)
