      Beziehungs‑Mapping: Verknüpfung mit anderen IOCs im Vorfall herstellen
      Threat Intelligence: Bekannte Kampagnen oder Threat‑Actors, falls zutreffend, referenzieren
      Definitionen

      Artefakt: Ein Beweisstück, das einem Sicherheitsvorfall zugeordnet ist – kann Datei, Skript, Log oder Metadaten (IP, URL, Hash usw.) sein
      Attachment: Eine Datei, die einem Vorfall oder einer Aufgabe hochgeladen und angehängt wurde
      IOC (Indicator of Compromise): Beobachtbare Artefakte oder Beweise, die auf einen potenziellen Sicherheitsverstoß hinweisen
      Task: Arbeitseinheit, die Sicherheitsanalysten im Rahmen der Incident‑Response zugewiesen wird
      ENDGÜLTIGE ERINNERUNG – KRITISCH
